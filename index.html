<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Сортировка: Цвет и Форма</title>
  <link rel="stylesheet" href="style.css?v=20260723b">
  <!-- SDK Яндекс Игр: подключается ДО инициализации (п. журнала 2026-06-21) -->
  <script src="vk-bridge.min.js?v=20260718b"></script>
</head>
<body>

  <!-- Экран загрузки -->
  <div id="screen-loading" class="screen active">
    <div class="loading-box">
      <div class="loading-title" data-i18n="title">Сортировка: Цвет и Форма</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Главное меню -->
  <div id="screen-menu" class="screen">
    <div class="menu-box">
      <h1 class="game-title" data-i18n="title">Сортировка: Цвет и Форма</h1>
      <button id="btn-continue" class="btn btn-primary hidden" data-i18n="continue">Продолжить</button>
      <button id="btn-play" class="btn btn-primary" data-i18n="play">Играть</button>
      <button id="btn-levels" class="btn" data-i18n="levels">Уровни</button>
      <button id="btn-sound" class="btn btn-icon" aria-label="sound">♪</button>
    </div>
  </div>

  <!-- Экран сетки уровней: прогресс + прыжок на любой уже открытый -->
  <div id="screen-grid" class="screen">
    <header class="game-header">
      <button id="btn-grid-back" class="btn btn-icon">←</button>
      <div class="level-indicator" data-i18n="levels">Уровни</div>
      <span class="btn btn-icon spacer" aria-hidden="true"></span>
    </header>
    <div id="grid-wrap" class="grid-wrap">
      <div id="level-grid" class="level-grid"></div>
    </div>
  </div>

  <!-- Игровой экран (заглушка Фазы 0, наполняется в Фазе 1-2) -->
  <div id="screen-game" class="screen">
    <header class="game-header">
      <button id="btn-back" class="btn btn-icon">←</button>
      <div id="level-indicator" class="level-indicator"></div>
      <button id="btn-sound-game" class="btn btn-icon" aria-label="sound">♪</button>
    </header>
    <main id="board-wrap" class="board-wrap">
      <canvas id="board-canvas"></canvas>
    </main>
    <button id="btn-undo" class="btn btn-icon undo-btn hidden" aria-label="undo">↺</button>
    <div class="hint-wrap">
      <button id="btn-hint" class="btn btn-icon hint-btn" aria-label="hint">
        ?
        <span class="hint-ad-badge" aria-hidden="true">▶</span>
      </button>
      <div class="hint-ad-label" data-i18n="hintAd">Подсказка за рекламу</div>
    </div>
    <div id="hint-toast" class="hint-toast hidden" data-i18n="noMoves">Нет доступных ходов</div>

    <!-- Оверлей победы (за уровень) -->
    <div id="win-overlay" class="win-overlay hidden">
      <div class="win-box">
        <div class="win-title" data-i18n="win">Уровень пройден!</div>
        <button id="btn-next" class="btn btn-primary" data-i18n="next">Дальше</button>
      </div>
    </div>

    <!-- Оверлей завершения кампании (после последнего уровня) -->
    <div id="campaign-overlay" class="win-overlay hidden">
      <div class="win-box campaign-box">
        <div class="win-title" data-i18n="campaignWinTitle">Поздравляем! Вы прошли все уровни</div>
        <div class="campaign-note" data-i18n="campaignWinNote">Следите за обновлениями — скоро добавим новые</div>
        <div class="campaign-stats">
          <div class="stat">
            <span class="stat-value" id="stat-total"></span>
            <span class="stat-label" data-i18n="statTotal">Всего</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-average"></span>
            <span class="stat-label" data-i18n="statAverage">В среднем</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-fastest"></span>
            <span class="stat-label" data-i18n="statFastest">Быстрее всего</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-slowest"></span>
            <span class="stat-label" data-i18n="statSlowest">Дольше всего</span>
          </div>
        </div>
        <button id="btn-campaign-menu" class="btn btn-primary" data-i18n="campaignMenu">В меню</button>
      </div>
    </div>

    <canvas id="confetti-canvas" class="confetti-canvas"></canvas>
  </div>

  <script src="i18n.js?v=20260722"></script>
  <script src="vk_platform.js?v=20260718b"></script>
  <script src="levels.js?v=20260724"></script>
  <script src="board.js"></script>
  <script src="sound.js?v=20260717"></script>
  <script src="confetti.js"></script>
  <script src="stats.js?v=20260717"></script>
  <script src="game.js?v=20260722"></script>
  <script src="main.js?v=20260724"></script>
</body>
</html>
